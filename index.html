<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAR SERVICE LOG — ยืนยันตัวตน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #13161d;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #f97316;
    --accent2: #fb923c;
    --accent-glow: rgba(249,115,22,0.18);
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --text-muted: #454d66;
    --red: #ef4444;
    --green: #22c55e;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(249,115,22,0.05);
    animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slideUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 13px;
    margin-bottom: 32px;
    justify-content: center;
  }
  .logo-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .logo-text p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ─── Heading ─── */
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    text-align: center;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* ─── PIN dots ─── */
  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
    height: 18px;
    align-items: center;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    transform: scale(1.15);
  }
  .dot.error {
    background: var(--red);
    border-color: var(--red);
    box-shadow: 0 0 10px rgba(239,68,68,0.3);
  }
  .dot.success {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 10px rgba(34,197,94,0.3);
  }

  /* ─── Shake animation ─── */
  @keyframes shake {
    0%,100%{ transform:translateX(0) }
    20%    { transform:translateX(-8px) }
    40%    { transform:translateX(8px) }
    60%    { transform:translateX(-6px) }
    80%    { transform:translateX(6px) }
  }
  .pin-dots.shake { animation: shake 0.4s ease; }

  /* ─── Numpad ─── */
  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .key {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .key:hover { background: #252a3a; border-color: var(--accent); transform: translateY(-1px); }
  .key:active { transform: scale(0.94); background: var(--accent-glow); border-color: var(--accent); }
  .key-num {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .key-alpha {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    font-weight: 600;
  }
  .key.special { background: transparent; border-color: transparent; }
  .key.special:hover { background: var(--surface2); border-color: var(--border); }
  .key.del .key-num { font-size: 18px; color: var(--text-dim); }
  .key.zero { grid-column: 2; }

  /* ─── Status messages ─── */
  .status-msg {
    text-align: center;
    font-size: 12px;
    min-height: 20px;
    margin-bottom: 12px;
    font-weight: 600;
    transition: opacity 0.3s;
  }
  .status-msg.error  { color: var(--red); }
  .status-msg.warn   { color: #eab308; }
  .status-msg.success{ color: var(--green); }
  .status-msg.info   { color: var(--text-dim); }

  /* ─── Lock overlay ─── */
  .lock-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(10,12,16,0.92);
    backdrop-filter: blur(6px);
    border-radius: 24px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
  }
  .lock-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .lock-icon { font-size: 44px; }
  .lock-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--red); }
  .lock-countdown {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
  }
  .lock-sub { font-size: 12px; color: var(--text-dim); }

  /* ─── Setup mode ─── */
  .step-indicator {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }
  .step-dot.active { background: var(--accent); transform: scale(1.3); }
  .step-dot.done   { background: var(--green); }

  /* ─── Change PIN link ─── */
  .change-pin-btn {
    display: block;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    margin-top: 4px;
    transition: color 0.2s;
    background: none;
    border: none;
    font-family: 'Sarabun', sans-serif;
    width: 100%;
    padding: 4px;
  }
  .change-pin-btn:hover { color: var(--accent); }

  /* ─── Attempts indicator ─── */
  .attempts-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .attempt-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }
  .attempt-dot.used { background: var(--red); }
</style>
</head>
<body>

<div class="card" id="mainCard">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">🏍</div>
    <div class="logo-text">
      <h1>CAR SERVICE LOG</h1>
      <p>บันทึกการเข้าศูนย์บริการ</p>
    </div>
  </div>

  <!-- Step indicators (setup mode) -->
  <div class="step-indicator" id="stepIndicator" style="display:none">
    <div class="step-dot active" id="step1dot"></div>
    <div class="step-dot" id="step2dot"></div>
  </div>

  <div class="title" id="mainTitle">กรอก PIN</div>
  <div class="subtitle" id="mainSub">กรอก PIN 4 หลักเพื่อเข้าสู่ระบบ</div>

  <!-- PIN dots -->
  <div class="pin-dots" id="pinDots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <!-- Attempts indicator (login mode only) -->
  <div class="attempts-row" id="attemptsRow" style="display:none">
    <div class="attempt-dot" id="att0"></div>
    <div class="attempt-dot" id="att1"></div>
    <div class="attempt-dot" id="att2"></div>
  </div>

  <!-- Status -->
  <div class="status-msg info" id="statusMsg"></div>

  <!-- Numpad -->
  <div class="numpad" id="numpad">
    <div class="key" onclick="pressKey('1')"><span class="key-num">1</span></div>
    <div class="key" onclick="pressKey('2')"><span class="key-num">2</span><span class="key-alpha">ABC</span></div>
    <div class="key" onclick="pressKey('3')"><span class="key-num">3</span><span class="key-alpha">DEF</span></div>
    <div class="key" onclick="pressKey('4')"><span class="key-num">4</span><span class="key-alpha">GHI</span></div>
    <div class="key" onclick="pressKey('5')"><span class="key-num">5</span><span class="key-alpha">JKL</span></div>
    <div class="key" onclick="pressKey('6')"><span class="key-num">6</span><span class="key-alpha">MNO</span></div>
    <div class="key" onclick="pressKey('7')"><span class="key-num">7</span><span class="key-alpha">PQRS</span></div>
    <div class="key" onclick="pressKey('8')"><span class="key-num">8</span><span class="key-alpha">TUV</span></div>
    <div class="key" onclick="pressKey('9')"><span class="key-num">9</span><span class="key-alpha">WXYZ</span></div>
    <div class="key special" id="keyEmpty"></div>
    <div class="key zero" onclick="pressKey('0')"><span class="key-num">0</span></div>
    <div class="key special del" onclick="pressDelete()"><span class="key-num">⌫</span></div>
  </div>

  <!-- Change PIN -->
  <button class="change-pin-btn" id="changePinBtn" onclick="startChangePIN()" style="display:none">
    🔑 เปลี่ยน PIN
  </button>

  <!-- Lock overlay -->
  <div class="lock-overlay" id="lockOverlay">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">บัญชีถูกล็อค</div>
    <div class="lock-countdown" id="lockCountdown">30</div>
    <div class="lock-sub">วินาที — กรุณารอ</div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
const PIN_KEY       = 'csl_pin_hash';
const SESSION_KEY   = 'csl_session';
const LOCK_KEY      = 'csl_lock_until';
const ATTEMPTS_KEY  = 'csl_attempts';
const LOCK_DURATION = 30; // seconds
const MAX_ATTEMPTS  = 3;
const PIN_LENGTH    = 4;
const APP_URL       = 'app.html'; // หน้าแอปหลัก

let currentInput  = '';
let mode          = 'login'; // 'login' | 'setup' | 'change_old' | 'change_new' | 'change_confirm'
let setupFirstPin = '';

// ─── Simple hash (SHA-256 via Web Crypto) ────────────────
async function hashPIN(pin) {
  const msgBuffer = new TextEncoder().encode(pin + 'csl_salt_2024');
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

// ─── Init ────────────────────────────────────────────────
window.onload = () => {
  // Check if already unlocked this session
  if (sessionStorage.getItem(SESSION_KEY) === 'unlocked') {
    goToApp();
    return;
  }

  // Check lock
  checkLock();

  const hasPin = !!localStorage.getItem(PIN_KEY);
  if (!hasPin) {
    enterSetupMode();
  } else {
    enterLoginMode();
  }
};

// ─── Mode switchers ──────────────────────────────────────
function enterLoginMode() {
  mode = 'login';
  currentInput = '';
  document.getElementById('mainTitle').textContent = 'กรอก PIN';
  document.getElementById('mainSub').textContent = 'กรอก PIN 4 หลักเพื่อเข้าสู่ระบบ';
  document.getElementById('stepIndicator').style.display = 'none';
  document.getElementById('attemptsRow').style.display = 'flex';
  document.getElementById('changePinBtn').style.display = 'block';
  setStatus('');
  updateDots();
  updateAttemptsUI();
}

function enterSetupMode() {
  mode = 'setup';
  currentInput = '';
  setupFirstPin = '';
  document.getElementById('mainTitle').textContent = 'ตั้ง PIN ใหม่';
  document.getElementById('mainSub').textContent = 'กรอก PIN 4 หลักที่ต้องการใช้';
  document.getElementById('stepIndicator').style.display = 'flex';
  document.getElementById('attemptsRow').style.display = 'none';
  document.getElementById('changePinBtn').style.display = 'none';
  setStepUI(1);
  setStatus('ยังไม่มี PIN — กรุณาตั้งค่าก่อนใช้งาน', 'info');
  updateDots();
}

function startChangePIN() {
  mode = 'change_old';
  currentInput = '';
  document.getElementById('mainTitle').textContent = 'เปลี่ยน PIN';
  document.getElementById('mainSub').textContent = 'กรอก PIN เดิมก่อน';
  document.getElementById('stepIndicator').style.display = 'none';
  document.getElementById('changePinBtn').style.display = 'none';
  setStatus('');
  updateDots();
}

// ─── Keypress ────────────────────────────────────────────
function pressKey(digit) {
  if (isLocked()) return;
  if (currentInput.length >= PIN_LENGTH) return;
  currentInput += digit;
  updateDots();
  if (currentInput.length === PIN_LENGTH) {
    setTimeout(handlePINComplete, 120);
  }
}

function pressDelete() {
  if (currentInput.length > 0) {
    currentInput = currentInput.slice(0,-1);
    updateDots();
    setStatus('');
  }
}

// ─── Handle complete PIN entry ────────────────────────────
async function handlePINComplete() {
  if (mode === 'login') {
    await handleLogin();
  } else if (mode === 'setup') {
    if (!setupFirstPin) {
      setupFirstPin = currentInput;
      currentInput = '';
      setStepUI(2);
      document.getElementById('mainSub').textContent = 'กรอก PIN อีกครั้งเพื่อยืนยัน';
      setStatus('');
      updateDots();
    } else {
      if (currentInput === setupFirstPin) {
        await saveNewPIN(currentInput);
      } else {
        shakeAndReset('PIN ไม่ตรงกัน — เริ่มใหม่', 'error');
        setTimeout(() => { setupFirstPin=''; setStepUI(1); document.getElementById('mainSub').textContent='กรอก PIN 4 หลักที่ต้องการใช้'; }, 600);
      }
    }
  } else if (mode === 'change_old') {
    const hash = await hashPIN(currentInput);
    if (hash === localStorage.getItem(PIN_KEY)) {
      mode = 'change_new';
      setupFirstPin = '';
      currentInput = '';
      document.getElementById('mainTitle').textContent = 'เปลี่ยน PIN';
      document.getElementById('mainSub').textContent = 'กรอก PIN ใหม่ (4 หลัก)';
      document.getElementById('stepIndicator').style.display = 'flex';
      setStepUI(1);
      setStatus('PIN ถูกต้อง — กรอก PIN ใหม่', 'success');
      updateDots();
    } else {
      shakeAndReset('PIN เดิมไม่ถูกต้อง', 'error');
    }
  } else if (mode === 'change_new') {
    setupFirstPin = currentInput;
    mode = 'change_confirm';
    currentInput = '';
    document.getElementById('mainSub').textContent = 'กรอก PIN ใหม่อีกครั้ง';
    setStepUI(2);
    setStatus('');
    updateDots();
  } else if (mode === 'change_confirm') {
    if (currentInput === setupFirstPin) {
      await saveNewPIN(currentInput);
    } else {
      shakeAndReset('PIN ไม่ตรงกัน — เริ่มใหม่', 'error');
      setTimeout(() => {
        mode = 'change_new';
        setupFirstPin = '';
        setStepUI(1);
        document.getElementById('mainSub').textContent = 'กรอก PIN ใหม่ (4 หลัก)';
      }, 600);
    }
  }
}

// ─── Login logic ──────────────────────────────────────────
async function handleLogin() {
  const hash = await hashPIN(currentInput);
  if (hash === localStorage.getItem(PIN_KEY)) {
    // SUCCESS
    localStorage.removeItem(ATTEMPTS_KEY);
    setDotsState('success');
    setStatus('✅ ยืนยันตัวตนสำเร็จ', 'success');
    sessionStorage.setItem(SESSION_KEY, 'unlocked');
    setTimeout(goToApp, 500);
  } else {
    // FAIL
    let attempts = parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0') + 1;
    localStorage.setItem(ATTEMPTS_KEY, attempts);
    updateAttemptsUI();

    if (attempts >= MAX_ATTEMPTS) {
      localStorage.removeItem(ATTEMPTS_KEY);
      const lockUntil = Date.now() + LOCK_DURATION * 1000;
      localStorage.setItem(LOCK_KEY, lockUntil);
      shakeAndReset('', 'error');
      startLockCountdown(LOCK_DURATION);
    } else {
      const remaining = MAX_ATTEMPTS - attempts;
      shakeAndReset(`PIN ไม่ถูกต้อง — เหลืออีก ${remaining} ครั้ง`, 'error');
    }
  }
}

// ─── Save new PIN ─────────────────────────────────────────
async function saveNewPIN(pin) {
  const hash = await hashPIN(pin);
  localStorage.setItem(PIN_KEY, hash);
  setDotsState('success');
  setStatus('✅ ตั้ง PIN สำเร็จ!', 'success');
  sessionStorage.setItem(SESSION_KEY, 'unlocked');
  setTimeout(goToApp, 600);
}

// ─── Go to app ────────────────────────────────────────────
function goToApp() {
  document.querySelector('.card').style.transition = 'opacity 0.3s, transform 0.3s';
  document.querySelector('.card').style.opacity = '0';
  document.querySelector('.card').style.transform = 'translateY(-20px) scale(0.97)';
  setTimeout(() => { window.location.href = APP_URL; }, 300);
}

// ─── Lock system ─────────────────────────────────────────
let lockTimer = null;

function isLocked() {
  const lockUntil = parseInt(localStorage.getItem(LOCK_KEY) || '0');
  return Date.now() < lockUntil;
}

function checkLock() {
  if (isLocked()) {
    const remaining = Math.ceil((parseInt(localStorage.getItem(LOCK_KEY)) - Date.now()) / 1000);
    startLockCountdown(remaining);
  }
}

function startLockCountdown(seconds) {
  const overlay = document.getElementById('lockOverlay');
  const countdown = document.getElementById('lockCountdown');
  overlay.classList.add('show');
  let remaining = seconds;
  countdown.textContent = remaining;
  clearInterval(lockTimer);
  lockTimer = setInterval(() => {
    remaining--;
    countdown.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(lockTimer);
      localStorage.removeItem(LOCK_KEY);
      overlay.classList.remove('show');
      currentInput = '';
      updateDots();
      setStatus('ปลดล็อคแล้ว — กรอก PIN ใหม่', 'info');
    }
  }, 1000);
}

// ─── UI helpers ──────────────────────────────────────────
function updateDots() {
  for (let i=0;i<PIN_LENGTH;i++) {
    const d = document.getElementById('d'+i);
    d.className = 'dot' + (i < currentInput.length ? ' filled' : '');
  }
}

function setDotsState(state) {
  for (let i=0;i<PIN_LENGTH;i++) {
    document.getElementById('d'+i).className = 'dot '+state;
  }
}

function shakeAndReset(msg, type) {
  setDotsState('error');
  const dots = document.getElementById('pinDots');
  dots.classList.add('shake');
  if (msg) setStatus(msg, type);
  setTimeout(() => {
    dots.classList.remove('shake');
    currentInput = '';
    updateDots();
  }, 500);
}

function setStatus(msg, type='info') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
}

function setStepUI(step) {
  for (let i=1;i<=2;i++) {
    const d = document.getElementById('step'+i+'dot');
    if (i < step) d.className = 'step-dot done';
    else if (i === step) d.className = 'step-dot active';
    else d.className = 'step-dot';
  }
}

function updateAttemptsUI() {
  const attempts = parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0');
  for (let i=0;i<MAX_ATTEMPTS;i++) {
    const d = document.getElementById('att'+i);
    d.className = 'attempt-dot' + (i < attempts ? ' used' : '');
  }
}

// ─── Keyboard support ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') pressKey(e.key);
  else if (e.key === 'Backspace') pressDelete();
  else if (e.key === 'Enter' && currentInput.length === PIN_LENGTH) handlePINComplete();
});
</script>
</body>
</html>
